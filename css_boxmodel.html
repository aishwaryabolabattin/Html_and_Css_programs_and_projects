<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            color:red;
            background-color:yellow;
            font-size:30px;
            font-family:arial;
            height:200px;
            width:500px;
            text-align:center;
            margin-left:100px;
            margin-bottom:50px;
            margin-right:100px;
            margin-top:50px;
            padding:50px;
            padding-left:50px;
            padding-bottom:50px;
            padding-right:50px;
            padding-top:50px;
            border-left:5px dashed blue;
            border-bottom:5px solid green;
            border-right:5px double purple;
            border-top:5px dotted red;
            border-bottom-left-radius:50px;
            border-bottom-right-radius:50px;
            border-top-right-radius:50px;
            border-top-left-radius:50px;
            
        }
    </style>
</head>
<body>
    <p>Hello Good Morning</p>
    <p>We are learning CSS Box Model</p>
</body>
</html>
